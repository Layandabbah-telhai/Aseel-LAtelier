<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aseel L'Atelier - Orders</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="theme.css" rel="stylesheet">

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script>requireAuth();</script>
</head>

<body>
  <div class="container py-4 py-md-5">

    <!-- HERO -->
    <div class="hero mb-4">
      <div class="hero-inner d-flex justify-content-between align-items-center">

        <div>
          <div class="brand">Aseel L'Atelier</div>
          <h1 class="hero-title">Orders</h1>
        </div>

        <div class="hero-actions">
          <a class="btn btn-outline-secondary btn-soft" href="customers.html">Customers</a>
          <a class="btn btn-outline-secondary btn-soft" href="dresses.html">Dresses</a>
          <a class="btn btn-outline-secondary btn-soft" href="appointments.html">Appointments</a>
          <a class="btn btn-outline-secondary btn-soft" href="payments.html">Payments</a>
          <button class="btn btn-outline-danger btn-soft" onclick="logout()">Logout</button>
        </div>

      </div>
    </div>

    <!-- SEARCH -->
    <div class="card card-luxe mb-4">
      <div class="card-body">

        <div class="row g-3 align-items-end">
          <div class="col-md-6">
            <input id="searchInput" class="form-control" placeholder="Search orders..." />
          </div>

          <div class="col-md-3 d-grid">
            <button id="searchBtn" class="btn btn-primary">Search</button>
          </div>

          <div class="col-md-3 d-grid">
            <button id="resetBtn" class="btn btn-outline-secondary">Reset</button>
          </div>
        </div>

        <div class="mt-3 small-muted">
          API: <span id="apiUrlText"></span>
        </div>

      </div>
    </div>

    <!-- FORM -->
    <div class="card card-luxe mb-4">
      <div class="card-header">Order Details</div>
      <div class="card-body">

        <form id="orderForm" class="row g-3">

          <input type="hidden" id="order_id" />

          <div class="col-md-6">
            <label>Customer</label>
            <select id="customer_id" class="form-select" required></select>
          </div>

          <div class="col-md-6">
            <label>Dress</label>
            <select id="dress_id" class="form-select" required></select>
          </div>

          <div class="col-md-4">
            <input id="occasion_type" class="form-control" placeholder="Occasion" />
          </div>

          <div class="col-md-4">
            <input id="order_date" type="date" class="form-control" />
          </div>

          <div class="col-md-4">
            <select id="status" class="form-select">
              <option value="In Progress">In Progress</option>
              <option value="Ready">Ready</option>
              <option value="Delivered">Delivered</option>
            </select>
          </div>

          <div class="col-md-6 d-grid">
            <button class="btn btn-primary">Save</button>
          </div>

          <div class="col-md-6 d-grid">
            <button type="button" id="cancelEditBtn" class="btn btn-outline-secondary">Cancel</button>
          </div>

        </form>

      </div>
    </div>

    <!-- TABLE -->
    <div class="card card-luxe">
      <div class="card-header d-flex justify-content-between">
        <span>Orders</span>
        <span id="ordersCount">0</span>
      </div>

      <div class="card-body table-responsive">
        <table class="table">
          <thead>
            <tr>
              <th>#</th>
              <th>Customer</th>
              <th>Dress</th>
              <th>Occasion</th>
              <th>Date</th>
              <th>Status</th>
              <th style="width:320px;">Actions</th>
            </tr>
          </thead>
          <tbody id="ordersTbody"></tbody>
        </table>
      </div>
    </div>

  </div>

  <script src="orders.js"></script>
</body>

</html>
