<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aseel L'Atelier - Payments</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="theme.css" rel="stylesheet">

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script>
    requireAuth();
  </script>
</head>

<body>
  <div class="container py-4 py-md-5">

    <div id="sharedNav"></div>

    <div class="mb-4">
      <h1 class="hero-title mb-2">Payments</h1>
      <p class="hero-sub mb-0">Manage all payments or focus on one order only.</p>
    </div>

    <div class="card card-luxe mb-4">
      <div class="card-body">
        <div class="small-muted">
          API:
          <span id="apiUrlText"></span>
        </div>
        <div class="mt-3" id="orderSummary"></div>
      </div>
    </div>

    <div class="card card-luxe mb-4">
      <div class="card-header">Payment Details</div>
      <div class="card-body">

        <form id="paymentForm" class="row g-3">
          <input type="hidden" id="payment_id" />

          <div class="col-md-6">
            <label class="label-soft">Order</label>
            <select id="order_id" class="form-select" required></select>
          </div>

          <div class="col-md-3">
            <label class="label-soft">Amount</label>
            <input id="amount" type="number" step="0.01" class="form-control" placeholder="Amount" required />
          </div>

          <div class="col-md-3">
            <label class="label-soft">Payment Date</label>
            <input id="payment_date" type="date" class="form-control" />
          </div>

          <div class="col-md-6">
            <label class="label-soft">Payment Method</label>
            <select id="payment_method" class="form-select">
              <option value="">Select method</option>
              <option value="Cash">Cash</option>
              <option value="Credit Card">Credit Card</option>
              <option value="Debit Card">Debit Card</option>
              <option value="Bank Transfer">Bank Transfer</option>
              <option value="Check">Check</option>
              <option value="Other">Other</option>
            </select>
          </div>

          <div class="col-md-6">
            <label class="label-soft">Notes</label>
            <input id="notes" class="form-control" placeholder="Notes" />
          </div>

          <div class="col-md-6 d-grid">
            <button type="submit" class="btn btn-primary">Save</button>
          </div>

          <div class="col-md-6 d-grid">
            <button type="button" id="cancelEditBtn" class="btn btn-outline-secondary">Cancel</button>
          </div>
        </form>

      </div>
    </div>

    <div class="card card-luxe">
      <div class="card-header d-flex justify-content-between align-items-center">
        <span>Payments</span>
        <span class="badge-soft px-3 py-2 rounded-pill" id="paymentsCount">0 payments</span>
      </div>

      <div class="card-body table-responsive">
        <table class="table align-middle">
          <thead>
            <tr>
              <th>#</th>
              <th>Order</th>
              <th>Customer</th>
              <th>Amount</th>
              <th>Date</th>
              <th>Method</th>
              <th>Notes</th>
              <th style="width:180px;">Actions</th>
            </tr>
          </thead>
          <tbody id="paymentsTbody"></tbody>
        </table>
      </div>
    </div>

  </div>

  <script src="nav.js"></script>
  <script src="payments.js"></script>
</body>

</html>
