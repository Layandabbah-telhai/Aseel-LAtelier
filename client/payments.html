<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aseel L'Atelier - Payments</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="theme.css" rel="stylesheet">

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script>requireAuth();</script>
</head>

<body>
  <div class="container py-4 py-md-5">

    <!-- HERO -->
    <div class="hero mb-4">
      <div class="hero-inner d-flex justify-content-between align-items-center">

        <div>
          <div class="brand">Aseel L'Atelier</div>
          <h1 class="hero-title">Payments</h1>
        </div>

        <div class="hero-actions">
          <a class="btn btn-outline-secondary btn-soft" href="customers.html">Customers</a>
          <a class="btn btn-outline-secondary btn-soft" href="dresses.html">Dresses</a>
          <a class="btn btn-outline-secondary btn-soft" href="orders.html">Orders</a>
          <a class="btn btn-outline-secondary btn-soft" href="appointments.html">Appointments</a>
          <button class="btn btn-outline-danger btn-soft" onclick="logout()">Logout</button>
        </div>

      </div>
    </div>

    <!-- ORDER SUMMARY -->
    <div class="card card-luxe mb-4">
      <div class="card-body" id="orderSummary"></div>
    </div>

    <!-- FORM -->
    <div class="card card-luxe mb-4">
      <div class="card-header">Payment Details</div>
      <div class="card-body">

        <form id="paymentForm" class="row g-3">

          <input type="hidden" id="payment_id" />

          <div class="col-md-6">
            <label>Order</label>
            <select id="order_id" class="form-select" required></select>
          </div>

          <div class="col-md-3">
            <input id="amount" type="number" step="0.01" class="form-control" placeholder="Amount" required />
          </div>

          <div class="col-md-3">
            <input id="payment_date" type="date" class="form-control" />
          </div>

          <div class="col-md-6">
            <label>Payment Method</label>
            <select id="payment_method" class="form-select">
              <option value="">Select method</option>
              <option>Cash</option>
              <option>Credit Card</option>
              <option>Debit Card</option>
              <option>Bank Transfer</option>
              <option>Check</option>
              <option>Other</option>
            </select>
          </div>

          <div class="col-md-6">
            <input id="notes" class="form-control" placeholder="Notes" />
          </div>

          <div class="col-md-6 d-grid">
            <button class="btn btn-primary">Save</button>
          </div>

          <div class="col-md-6 d-grid">
            <button type="button" id="cancelEditBtn" class="btn btn-outline-secondary">Cancel</button>
          </div>

        </form>

      </div>
    </div>

    <!-- TABLE -->
    <div class="card card-luxe">
      <div class="card-header d-flex justify-content-between">
        <span>Payments</span>
        <span id="paymentsCount">0</span>
      </div>

      <div class="card-body table-responsive">
        <table class="table">
          <thead>
            <tr>
              <th>#</th>
              <th>Order</th>
              <th>Customer</th>
              <th>Amount</th>
              <th>Date</th>
              <th>Method</th>
              <th>Notes</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="paymentsTbody"></tbody>
        </table>
      </div>
    </div>

  </div>

  <script src="payments.js"></script>
</body>

</html>
