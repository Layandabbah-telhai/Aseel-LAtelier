<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aseel L'Atelier - Customers</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="theme.css" rel="stylesheet">

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script>requireAuth();</script>
</head>

<body>
  <div class="container py-4 py-md-5">

    <div class="hero mb-4">
      <div class="hero-inner d-flex justify-content-between align-items-center">
        <div>
          <div class="brand">Aseel L'Atelier</div>
          <h1 class="hero-title">Customers</h1>
        </div>

        <div class="hero-actions">
          <a class="btn btn-outline-secondary btn-soft" href="dresses.html">Dresses</a>
          <a class="btn btn-outline-secondary btn-soft" href="orders.html">Orders</a>
          <a class="btn btn-outline-secondary btn-soft" href="appointments.html">Appointments</a>
          <a class="btn btn-outline-secondary btn-soft" href="payments.html">Payments</a>
          <button class="btn btn-outline-danger btn-soft" onclick="logout()">Logout</button>
        </div>
      </div>
    </div>

    <div class="card card-luxe mb-4">
      <div class="card-body">

        <div class="row g-3 align-items-end">
          <div class="col-md-6">
            <input id="searchInput" class="form-control" placeholder="Search customers..." />
          </div>

          <div class="col-md-3 d-grid">
            <button id="searchBtn" class="btn btn-primary">Search</button>
          </div>

          <div class="col-md-3 d-grid">
            <button id="resetBtn" class="btn btn-outline-secondary">Reset</button>
          </div>
        </div>

        <div class="mt-3 small-muted">
          API: <span id="apiUrlText"></span>
        </div>

      </div>
    </div>

    <div class="card card-luxe mb-4">
      <div class="card-header">Customer Details</div>
      <div class="card-body">

        <form id="customerForm" class="row g-3">
          <input type="hidden" id="customer_id">

          <div class="col-md-6">
            <input id="first_name" class="form-control" placeholder="First Name" required />
          </div>

          <div class="col-md-6">
            <input id="last_name" class="form-control" placeholder="Last Name" required />
          </div>

          <div class="col-md-4">
            <input id="phone" class="form-control" placeholder="Phone" required />
          </div>

          <div class="col-md-4">
            <input id="city" class="form-control" placeholder="City" />
          </div>

          <div class="col-md-4">
            <input id="email" class="form-control" placeholder="Email" />
          </div>

          <div class="col-md-6 d-grid">
            <button class="btn btn-primary">Save</button>
          </div>

          <div class="col-md-6 d-grid">
            <button type="button" id="cancelEditBtn" class="btn btn-outline-secondary">Cancel</button>
          </div>

        </form>

      </div>
    </div>

    <div class="card card-luxe">
      <div class="card-header d-flex justify-content-between">
        <span>Customers</span>
        <span id="customersCount">0</span>
      </div>

      <div class="card-body table-responsive">
        <table class="table align-middle">
          <thead>
            <tr>
              <th>#</th>
              <th>Name</th>
              <th>Phone</th>
              <th>City</th>
              <th>Email</th>
              <th style="width:220px;">Actions</th>
            </tr>
          </thead>
          <tbody id="customersTbody"></tbody>
        </table>
      </div>
    </div>

  </div>

  <script src="customers.js"></script>
</body>

</html>
