<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aseel L'Atelier - Customers</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="theme.css" rel="stylesheet">
  <script src="auth.js"></script>
  <script>
    requireAuth();
  </script>
</head>

<body>
  <div class="container py-4 py-md-5">

    <div class="hero mb-4">
      <div class="hero-inner">
        <div class="hero-grid">
          <div class="hero-brand-block">
            <div class="logo-and-copy">
              <img src="logo.png" alt="Aseel L'Atelier" class="logo-img">

              <div class="hero-copy">
                <div class="brand">Aseel L'Atelier</div>
                <h1 class="hero-title">Customers</h1>
                <p class="hero-sub">
                  Manage bridal clients, contact details, and event dates.
                </p>
              </div>
            </div>
          </div>

          <div class="hero-actions">
            <a class="btn btn-outline-secondary btn-soft" href="https://layandabbah-telhai.github.io/Aseel-LAtelier/client/dresses.html">Dresses</a>
            <a class="btn btn-outline-secondary btn-soft" href="https://layandabbah-telhai.github.io/Aseel-LAtelier/client/orders.html">Orders</a>
            <button class="btn btn-outline-danger btn-soft" onclick="logout()">Logout</button>
          </div>
        </div>
      </div>
    </div>

    <div class="card card-luxe mb-4">
      <div class="card-body">
        <div class="row g-3 align-items-end">
          <div class="col-lg-6">
            <label class="label-soft">Search (name / phone / email)</label>
            <input id="searchInput" class="form-control" placeholder="Search..." />
          </div>

          <div class="col-lg-3 d-grid">
            <button id="searchBtn" class="btn btn-primary">Search</button>
          </div>

          <div class="col-lg-3 d-grid">
            <button id="resetBtn" class="btn btn-outline-secondary">Reset</button>
          </div>
        </div>

        <div class="mt-3 small-muted">
          API: <span id="apiUrlText">/api/customers</span>
        </div>
      </div>
    </div>

    <div class="card card-luxe mb-4">
      <div class="card-header">Customer Details</div>
      <div class="card-body">
        <form id="customerForm" class="row g-3">
          <input type="hidden" id="customer_id" />

          <div class="col-md-6">
            <label class="label-soft">First Name *</label>
            <input id="first_name" class="form-control" required />
          </div>

          <div class="col-md-6">
            <label class="label-soft">Last Name *</label>
            <input id="last_name" class="form-control" required />
          </div>

          <div class="col-md-4">
            <label class="label-soft">Phone *</label>
            <input id="phone" class="form-control" required />
          </div>

          <div class="col-md-4">
            <label class="label-soft">Event Date</label>
            <input id="event_date" type="date" class="form-control" />
          </div>

          <div class="col-md-4">
            <label class="label-soft">Email</label>
            <input id="email" type="email" class="form-control" />
          </div>

          <div class="col-md-6 d-grid">
            <button class="btn btn-primary" type="submit">Save</button>
          </div>

          <div class="col-md-6 d-grid">
            <button id="cancelEditBtn" type="button" class="btn btn-outline-secondary">Cancel Edit</button>
          </div>
        </form>
      </div>
    </div>

    <div class="card card-luxe">
      <div class="card-header d-flex align-items-center justify-content-between">
        <span>Customer Registry</span>
        <span class="badge-soft px-3 py-2 rounded-pill" id="customersCount">0 customers</span>
      </div>

      <div class="card-body table-responsive">
        <table class="table align-middle">
          <thead>
            <tr>
              <th>#</th>
              <th>Name</th>
              <th>Phone</th>
              <th>Event Date</th>
              <th>Email</th>
              <th style="width:180px;">Actions</th>
            </tr>
          </thead>
          <tbody id="customersTbody"></tbody>
        </table>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>

</html>
