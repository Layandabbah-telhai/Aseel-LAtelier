<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aseel L'Atelier - Measurements</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="theme.css" rel="stylesheet">

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script>requireAuth();</script>
</head>

<body>
  <div class="container py-4 py-md-5">

    <div id="sharedNav"></div>

    <div class="mb-4">
      <h1 class="hero-title mb-2">Measurements</h1>
      <p class="hero-sub mb-0">Manage order measurements and tailoring details.</p>
    </div>

    <div class="card card-luxe mb-4">
      <div class="card-body" id="orderSummary"></div>
    </div>

    <div class="card card-luxe mb-4">
      <div class="card-header">Measurement Details</div>
      <div class="card-body">

        <form id="measurementForm" class="row g-3">

          <input type="hidden" id="measurement_id" />

          <div class="col-md-6">
            <label class="label-soft">Customer</label>
            <select id="customer_id" class="form-select"></select>
          </div>

          <div class="col-md-6">
            <label class="label-soft">Order</label>
            <select id="order_id" class="form-select"></select>
          </div>

          <div class="col-md-3"><input id="tailoring_type" class="form-control" placeholder="Tailoring Type" /></div>
          <div class="col-md-3"><input id="bust" type="number" class="form-control" placeholder="Bust" /></div>
          <div class="col-md-3"><input id="waist" type="number" class="form-control" placeholder="Waist" /></div>
          <div class="col-md-3"><input id="hips" type="number" class="form-control" placeholder="Hips" /></div>

          <div class="col-md-4"><input id="shoulder" type="number" class="form-control" placeholder="Shoulder" /></div>
          <div class="col-md-4"><input id="sleeve_length" type="number" class="form-control" placeholder="Sleeve" /></div>
          <div class="col-md-4"><input id="dress_length" type="number" class="form-control" placeholder="Length" /></div>

          <div class="col-12">
            <textarea id="notes" class="form-control" placeholder="Notes"></textarea>
          </div>

          <div class="col-md-6 d-grid">
            <button class="btn btn-primary">Save</button>
          </div>

          <div class="col-md-6 d-grid">
            <button type="button" id="cancelEditBtn" class="btn btn-outline-secondary">Cancel</button>
          </div>

        </form>

      </div>
    </div>

    <div class="card card-luxe">
      <div class="card-header d-flex justify-content-between">
        <span>Measurements</span>
        <span id="measurementsCount">0</span>
      </div>

      <div class="card-body table-responsive">
        <table class="table">
          <thead>
            <tr>
              <th>#</th>
              <th>Order</th>
              <th>Customer</th>
              <th>Dress</th>
              <th>Occasion</th>
              <th>Type</th>
              <th>Bust</th>
              <th>Waist</th>
              <th>Hips</th>
              <th>Shoulder</th>
              <th>Sleeve</th>
              <th>Length</th>
              <th>Notes</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="measurementsTbody"></tbody>
        </table>
      </div>
    </div>

  </div>

  <script src="nav.js"></script>
  <script src="measurements.js"></script>
</body>

</html>
