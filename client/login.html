<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aseel L'Atelier - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="./theme.css" rel="stylesheet">
</head>

<body>
  <div class="container py-5">
    <div class="card card-luxe mx-auto" style="max-width: 460px;">
      <div class="card-body">
        <div class="text-center mb-4">
          <img src="./logo.png" alt="Aseel L'Atelier" class="logo-img mb-3" style="width:120px;">
          <div class="brand">Aseel L'Atelier</div>
          <h2 class="hero-title" style="font-size:2rem;">Login</h2>
          <p class="small-muted mb-0">Access the atelier management system.</p>
        </div>

        <form id="loginForm" class="row g-3">
          <div class="col-12">
            <label class="label-soft">Email</label>
            <input id="email" type="email" class="form-control" required />
          </div>

          <div class="col-12">
            <label class="label-soft">Password</label>
            <input id="password" type="password" class="form-control" required />
          </div>

          <div class="col-12">
            <button type="submit" class="btn btn-primary w-100">Login</button>
          </div>

          <div class="col-12">
            <div id="loginError" class="text-danger text-center small"></div>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="./login.js"></script>
</body>

</html>
