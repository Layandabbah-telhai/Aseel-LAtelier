<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aseel L'Atelier - Dresses</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="theme.css" rel="stylesheet">

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script>requireAuth();</script>
</head>

<body>
  <div class="container py-4 py-md-5">

    <!-- HERO -->
    <div class="hero mb-4">
      <div class="hero-inner d-flex justify-content-between align-items-center">

        <div>
          <div class="brand">Aseel L'Atelier</div>
          <h1 class="hero-title">Dress Inventory</h1>
        </div>

        <div class="hero-actions">
          <a class="btn btn-outline-secondary btn-soft" href="customers.html">Customers</a>
          <a class="btn btn-outline-secondary btn-soft" href="orders.html">Orders</a>
          <a class="btn btn-outline-secondary btn-soft" href="appointments.html">Appointments</a>
          <a class="btn btn-outline-secondary btn-soft" href="payments.html">Payments</a>
          <button class="btn btn-outline-danger btn-soft" onclick="logout()">Logout</button>
        </div>

      </div>
    </div>

    <!-- SEARCH -->
    <div class="card card-luxe mb-4">
      <div class="card-body">

        <div class="row g-3 align-items-end">
          <div class="col-lg-6">
            <input id="searchInput" class="form-control" placeholder="Search dresses..." />
          </div>

          <div class="col-lg-3 d-grid">
            <button id="searchBtn" class="btn btn-primary">Search</button>
          </div>

          <div class="col-lg-3 d-grid">
            <button id="resetBtn" class="btn btn-outline-secondary">Reset</button>
          </div>
        </div>

        <div class="mt-3 small-muted">
          API: <span id="apiUrlText"></span>
        </div>

      </div>
    </div>

    <!-- FORM -->
    <div class="card card-luxe mb-4">
      <div class="card-header">Dress Details</div>
      <div class="card-body">

        <form id="dressForm" class="row g-3">

          <input type="hidden" id="dress_id" />
          <input type="hidden" id="existing_image_urls" />

          <div class="col-md-4">
            <input id="dress_name" class="form-control" placeholder="Dress Name" required />
          </div>

          <div class="col-md-2">
            <input id="size" class="form-control" placeholder="Size" />
          </div>

          <div class="col-md-3">
            <input id="color" class="form-control" placeholder="Color" />
          </div>

          <div class="col-md-3">
            <select id="status" class="form-select">
              <option value="Available">Available</option>
              <option value="Rented">Rented</option>
              <option value="Sold">Sold</option>
              <option value="In Repair">In Repair</option>
              <option value="Reserved">Reserved</option>
            </select>
          </div>

          <div class="col-md-3">
            <input id="rental_price" type="number" step="0.01" class="form-control" placeholder="Rental Price" />
          </div>

          <div class="col-md-3">
            <input id="sale_price" type="number" step="0.01" class="form-control" placeholder="Sale Price" />
          </div>

          <div class="col-md-6">
            <input id="image_file" type="file" multiple class="form-control" />
          </div>

          <div class="col-md-12">
            <input id="notes" class="form-control" placeholder="Notes" />
          </div>

          <div class="col-12">
            <div id="image_preview_gallery"></div>
          </div>

          <div class="col-md-6 d-grid">
            <button class="btn btn-primary">Save</button>
          </div>

          <div class="col-md-6 d-grid">
            <button type="button" id="cancelEditBtn" class="btn btn-outline-secondary">Cancel</button>
          </div>

          <div class="col-12">
            <div id="dressMessage"></div>
          </div>

        </form>

      </div>
    </div>

    <!-- TABLE -->
    <div class="card card-luxe">
      <div class="card-header d-flex justify-content-between">
        <span>Dresses</span>
        <span id="dressesCount">0</span>
      </div>

      <div class="card-body table-responsive">
        <table class="table">
          <thead>
            <tr>
              <th>#</th>
              <th>Image</th>
              <th>Name</th>
              <th>Size</th>
              <th>Color</th>
              <th>Status</th>
              <th>Rental</th>
              <th>Sale</th>
              <th>Notes</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="dressesTbody"></tbody>
        </table>
      </div>
    </div>

  </div>

  <script src="dresses.js"></script>
</body>

</html>
