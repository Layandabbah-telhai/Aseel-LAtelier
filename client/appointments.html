<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aseel L'Atelier - Appointments</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="theme.css" rel="stylesheet">
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script>
    requireAuth();
  </script>
</head>

<body>
  <div class="container py-4 py-md-5">

    <div id="sharedNav"></div>

    <div class="mb-4">
      <h1 class="hero-title mb-2">Appointments</h1>
      <p class="hero-sub mb-0">Manage consultations, fittings, delivery, pickup, and custom appointments.</p>
    </div>

    <div class="card card-luxe mb-4">
      <div class="card-body">
        <div class="row g-3 align-items-end">
          <div class="col-lg-5">
            <label class="label-soft">Search</label>
            <input id="searchInput" class="form-control" placeholder="Customer / phone / type / dress / occasion" />
          </div>

          <div class="col-lg-3">
            <label class="label-soft">Status</label>
            <select id="statusFilter" class="form-select">
              <option value="">All</option>
              <option value="Scheduled">Scheduled</option>
              <option value="Completed">Completed</option>
              <option value="Cancelled">Cancelled</option>
              <option value="Missed">Missed</option>
            </select>
          </div>

          <div class="col-lg-2 d-grid">
            <button id="searchBtn" class="btn btn-primary">Search</button>
          </div>

          <div class="col-lg-2 d-grid">
            <button id="resetBtn" class="btn btn-outline-secondary">Reset</button>
          </div>
        </div>

        <div class="mt-3 small-muted">
          API: <span id="apiUrlText">/api/appointments</span>
        </div>
        <div class="mt-3" id="orderSummary"></div>
      </div>
    </div>

    <div class="card card-luxe mb-4">
      <div class="card-header">Appointment Details</div>
      <div class="card-body">
        <form id="appointmentForm" class="row g-3">
          <input type="hidden" id="appointment_id" />

          <div class="col-md-6">
            <label class="label-soft">Customer *</label>
            <select id="customer_id" class="form-select" required></select>
          </div>

          <div class="col-md-6">
            <label class="label-soft">Order (optional)</label>
            <select id="order_id" class="form-select"></select>
          </div>

          <div class="col-md-3">
            <label class="label-soft">Appointment Type *</label>
            <select id="appointment_type" class="form-select" required>
              <option value="Consultation">Consultation</option>
              <option value="First Fitting">First Fitting</option>
              <option value="Second Fitting">Second Fitting</option>
              <option value="Delivery">Delivery</option>
              <option value="Pickup">Pickup</option>
              <option value="Custom">Custom</option>
            </select>
          </div>

          <div class="col-md-3">
            <label class="label-soft">Date *</label>
            <input id="appointment_date" type="date" class="form-control" required />
          </div>

          <div class="col-md-3">
            <label class="label-soft">Time</label>
            <input id="appointment_time" type="time" class="form-control" />
          </div>

          <div class="col-md-3">
            <label class="label-soft">Status *</label>
            <select id="status" class="form-select" required>
              <option value="Scheduled">Scheduled</option>
              <option value="Completed">Completed</option>
              <option value="Cancelled">Cancelled</option>
              <option value="Missed">Missed</option>
            </select>
          </div>

          <div class="col-12">
            <label class="label-soft">Notes</label>
            <textarea id="notes" class="form-control" rows="3" style="height:auto !important;"></textarea>
          </div>

          <div class="col-md-6 d-grid">
            <button type="submit" class="btn btn-primary">Save</button>
          </div>

          <div class="col-md-6 d-grid">
            <button id="cancelEditBtn" type="button" class="btn btn-outline-secondary">Cancel Edit</button>
          </div>
        </form>
      </div>
    </div>

    <div class="card card-luxe">
      <div class="card-header d-flex align-items-center justify-content-between">
        <span>Appointments</span>
        <span class="badge-soft px-3 py-2 rounded-pill" id="appointmentsCount">0 appointments</span>
      </div>

      <div class="card-body table-responsive">
        <table class="table align-middle">
          <thead>
            <tr>
              <th>#</th>
              <th>Order</th>
              <th>Customer</th>
              <th>Phone</th>
              <th>Dress</th>
              <th>Type</th>
              <th>Date</th>
              <th>Time</th>
              <th>Status</th>
              <th>Notes</th>
              <th style="width:180px;">Actions</th>
            </tr>
          </thead>
          <tbody id="appointmentsTbody"></tbody>
        </table>
      </div>
    </div>

  </div>

  <script src="nav.js"></script>
  <script src="appointments.js"></script>
</body>

</html>
