<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aseel L'Atelier - Appointments</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="theme.css" rel="stylesheet">

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script>requireAuth();</script>
</head>

<body>
  <div class="container py-4 py-md-5">

    <div class="hero mb-4">
      <div class="hero-inner">
        <div class="hero-grid">
          <div>
            <div class="brand">Aseel L'Atelier</div>
            <h1 class="hero-title">Appointments</h1>
          </div>

          <div class="hero-actions">
            <a class="btn btn-outline-secondary btn-soft" href="customers.html">Customers</a>
            <a class="btn btn-outline-secondary btn-soft" href="orders.html">Orders</a>
            <a class="btn btn-outline-secondary btn-soft" href="payments.html">Payments</a>
            <a class="btn btn-outline-secondary btn-soft" href="measurements.html">Measurements</a>
            <a class="btn btn-outline-secondary btn-soft" href="seamstresses.html">Seamstresses</a>
            <button class="btn btn-outline-danger btn-soft" onclick="logout()">Logout</button>
          </div>
        </div>
      </div>
    </div>

    <div class="card card-luxe mb-4">
      <div class="card-body">
        <div class="row g-3">

          <div class="col-md-4">
            <input id="searchInput" class="form-control" placeholder="Search..." />
          </div>

          <div class="col-md-3">
            <select id="statusFilter" class="form-select">
              <option value="">All Status</option>
              <option>Scheduled</option>
              <option>Completed</option>
              <option>Cancelled</option>
              <option>Missed</option>
            </select>
          </div>

          <div class="col-md-2 d-grid">
            <button id="searchBtn" class="btn btn-primary">Search</button>
          </div>

          <div class="col-md-2 d-grid">
            <button id="resetBtn" class="btn btn-outline-secondary">Reset</button>
          </div>
        </div>

        <div class="mt-3 small-muted">
          API: <span id="apiUrlText"></span>
        </div>

        <div class="mt-3" id="orderSummary"></div>
      </div>
    </div>

    <div class="card card-luxe mb-4">
      <div class="card-body">
        <form id="appointmentForm" class="row g-3">

          <input type="hidden" id="appointment_id">

          <div class="col-md-6">
            <select id="customer_id" class="form-select" required></select>
          </div>

          <div class="col-md-6">
            <select id="order_id" class="form-select"></select>
          </div>

          <div class="col-md-3">
            <select id="appointment_type" class="form-select" required>
              <option>Consultation</option>
              <option>First Fitting</option>
              <option>Second Fitting</option>
              <option>Delivery</option>
              <option>Pickup</option>
              <option>Custom</option>
            </select>
          </div>

          <div class="col-md-3">
            <input id="appointment_date" type="date" class="form-control" required>
          </div>

          <div class="col-md-3">
            <input id="appointment_time" type="time" class="form-control">
          </div>

          <div class="col-md-3">
            <select id="status" class="form-select">
              <option>Scheduled</option>
              <option>Completed</option>
              <option>Cancelled</option>
              <option>Missed</option>
            </select>
          </div>

          <div class="col-12">
            <textarea id="notes" class="form-control" placeholder="Notes"></textarea>
          </div>

          <div class="col-md-6 d-grid">
            <button class="btn btn-primary">Save</button>
          </div>

          <div class="col-md-6 d-grid">
            <button type="button" id="cancelEditBtn" class="btn btn-outline-secondary">Cancel</button>
          </div>

        </form>
      </div>
    </div>

    <div class="card card-luxe">
      <div class="card-header d-flex justify-content-between">
        <span>Appointments</span>
        <span id="appointmentsCount">0</span>
      </div>

      <div class="card-body table-responsive">
        <table class="table">
          <thead>
            <tr>
              <th>#</th>
              <th>Order</th>
              <th>Customer</th>
              <th>Date</th>
              <th>Status</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="appointmentsTbody"></tbody>
        </table>
      </div>
    </div>

  </div>

  <script src="appointments.js"></script>
</body>

</html>
