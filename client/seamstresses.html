<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aseel L'Atelier - Seamstresses</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="theme.css" rel="stylesheet">

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script>requireAuth();</script>
</head>

<body>
  <div class="container py-4 py-md-5">

    <div id="sharedNav"></div>

    <div class="mb-4">
      <h1 class="hero-title mb-2">Seamstresses & Assignments</h1>
      <p class="hero-sub mb-0">Manage seamstresses and order assignments.</p>
    </div>

    <div class="card card-luxe mb-4">
      <div class="card-body" id="orderSummary"></div>
    </div>

    <div class="card card-luxe mb-4">
      <div class="card-header">Seamstress</div>
      <div class="card-body">

        <form id="seamstressForm" class="row g-3">
          <input type="hidden" id="seamstress_id">

          <div class="col-md-6">
            <input id="name" class="form-control" placeholder="Name" required />
          </div>

          <div class="col-md-6">
            <input id="phone" class="form-control" placeholder="Phone" />
          </div>

          <div class="col-md-6 d-grid">
            <button class="btn btn-primary">Save</button>
          </div>

          <div class="col-md-6 d-grid">
            <button type="button" id="cancelSeamstressEditBtn" class="btn btn-outline-secondary">Cancel</button>
          </div>

        </form>

      </div>
    </div>

    <div class="card card-luxe mb-4">
      <div class="card-header">Assignment</div>
      <div class="card-body">

        <form id="assignmentForm" class="row g-3">

          <input type="hidden" id="assignment_id">

          <div class="col-md-6">
            <label class="label-soft">Order</label>
            <select id="order_id" class="form-select" required></select>
          </div>

          <div class="col-md-6">
            <label class="label-soft">Seamstress</label>
            <select id="assigned_seamstress_id" class="form-select" required></select>
          </div>

          <div class="col-md-6">
            <select id="task_type" class="form-select">
              <option value="">Select task</option>
              <option>Special Tailoring</option>
              <option>Regular Tailoring</option>
              <option>Alteration</option>
              <option>Fitting Update</option>
              <option>Final Adjustment</option>
            </select>
          </div>

          <div class="col-md-6">
            <input id="assignment_notes" class="form-control" placeholder="Notes" />
          </div>

          <div class="col-md-6 d-grid">
            <button class="btn btn-primary">Save</button>
          </div>

          <div class="col-md-6 d-grid">
            <button type="button" id="cancelAssignmentEditBtn" class="btn btn-outline-secondary">Cancel</button>
          </div>

        </form>

      </div>
    </div>

    <div class="card card-luxe">
      <div class="card-header d-flex justify-content-between">
        <span>Assignments</span>
        <span id="assignmentsCount">0</span>
      </div>

      <div class="card-body table-responsive">
        <table class="table">
          <thead>
            <tr>
              <th>#</th>
              <th>Order</th>
              <th>Customer</th>
              <th>Dress</th>
              <th>Seamstress</th>
              <th>Task</th>
              <th>Notes</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="assignmentsTbody"></tbody>
        </table>
      </div>
    </div>

  </div>

  <script src="nav.js"></script>
  <script src="seamstresses.js"></script>
</body>

</html>
