<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bridal Atelier - Customers</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="./theme.css" rel="stylesheet">
</head>

<body>
  <div class="container py-4 py-md-5">

    <div class="hero mb-4">
      <div
        class="hero-inner d-flex flex-column flex-lg-row align-items-start align-items-lg-center justify-content-between gap-3">
        <div>
          <div class="brand">Bridal Atelier</div>
          <h1 class="hero-title">Customers & Appointments</h1>
          <p class="hero-sub">Elegant client management for fittings, sales, and rentals.</p>
        </div>
        <div class="d-flex flex-wrap align-items-center gap-2">
          <span class="pill"><span class="pill-dot"></span> Premium Studio</span>
          <a class="btn btn-outline-secondary" href="./orders.html">Orders</a>
        </div>
      </div>
    </div>

    <div class="card card-luxe mb-4">
      <div class="card-body">
        <div class="row g-2 align-items-end">
          <div class="col-md-6">
            <label class="label-soft">Search (name / phone / email)</label>
            <input id="searchInput" class="form-control" placeholder="Search..." />
          </div>
          <div class="col-md-3 d-grid">
            <button id="searchBtn" class="btn btn-primary">Search</button>
          </div>
          <div class="col-md-3 d-grid">
            <button id="resetBtn" class="btn btn-outline-secondary">Reset</button>
          </div>
        </div>
        <div class="mt-2 small-muted">API: <span id="apiUrlText">http://localhost:4000/api/customers</span></div>
      </div>
    </div>

    <div class="card card-luxe mb-4">
      <div class="card-header">Add / Edit Customer</div>
      <div class="card-body">
        <form id="customerForm" class="row g-3">
          <input type="hidden" id="customer_id" />

          <div class="col-md-3">
            <label class="label-soft">First Name *</label>
            <input id="first_name" class="form-control" required />
          </div>

          <div class="col-md-3">
            <label class="label-soft">Last Name *</label>
            <input id="last_name" class="form-control" required />
          </div>

          <div class="col-md-3">
            <label class="label-soft">Phone *</label>
            <input id="phone" class="form-control" required />
          </div>

          <div class="col-md-3">
            <label class="label-soft">Event Date</label>
            <input id="event_date" type="date" class="form-control" />
          </div>

          <div class="col-md-6">
            <label class="label-soft">Email</label>
            <input id="email" type="email" class="form-control" placeholder="name@example.com" />
          </div>

          <div class="col-md-3">
            <label class="label-soft">Order Type</label>
            <select id="order_type" class="form-select">
              <option value="sale" selected>Sale</option>
              <option value="rental">Rental</option>
            </select>
          </div>

          <div class="col-md-3">
            <label class="label-soft invisible">Save</label>
            <button id="saveBtn" class="btn btn-primary w-100" type="submit">
              Save
            </button>
          </div>


          <div class="col-12">
            <button id="cancelEditBtn" type="button" class="btn btn-outline-secondary w-100">Cancel Edit</button>
          </div>
        </form>
      </div>
    </div>

    <div class="card card-luxe">
      <div class="card-header d-flex align-items-center justify-content-between">
        <span>Customers List</span>
        <span class="badge-soft px-3 py-2 rounded-pill" id="customersCount">0 customers</span>
      </div>
      <div class="card-body table-responsive">
        <table class="table align-middle">
          <thead>
            <tr>
              <th style="width:60px;">#</th>
              <th>Name</th>
              <th>Phone</th>
              <th>Event Date</th>
              <th>Email</th>
              <th style="width:180px;">Actions</th>
            </tr>
          </thead>
          <tbody id="customersTbody"></tbody>
        </table>
      </div>
    </div>

  </div>

  <script src="./app.js"></script>
</body>

</html>
