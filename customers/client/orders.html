<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Orders</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1 class="m-0">Orders</h1>
      <div class="d-flex gap-2">
        <a class="btn btn-outline-secondary" href="./index.html">Customers</a>
      </div>
    </div>

    <div class="card mb-3">
      <div class="card-header">Create Order</div>
      <div class="card-body">
        <form id="orderForm" class="row g-2">
          <div class="col-md-3">
            <label class="form-label">Customer ID *</label>
            <input id="customer_id" class="form-control" type="number" required />
          </div>

          <div class="col-md-5">
            <label class="form-label">Dress *</label>
            <select id="dress_id" class="form-select" required></select>
            <div class="small text-muted mt-1" id="dressPriceInfo"></div>
          </div>

          <div class="col-md-2">
            <label class="form-label">Order Type</label>
            <select id="order_type" class="form-select">
              <option value="sale" selected>Sale</option>
              <option value="rental">Rental</option>
            </select>
          </div>

          <div class="col-md-2">
            <label class="form-label">Pickup Date (تاريخ الاستلام) *</label>
            <input id="order_date" type="date" class="form-control" required />
          </div>

          <div class="col-md-3" id="returnDateWrap" style="display:none;">
            <label class="form-label">Return Date *</label>
            <input id="return_date" type="date" class="form-control" />
          </div>

          <div class="col-md-3">
            <label class="form-label">Initial Status</label>
            <select id="status" class="form-select">
              <option value="IN_SEWING" selected>IN_SEWING</option>
              <option value="READY_FOR_FITTING">READY_FOR_FITTING</option>
              <option value="COMPLETED">COMPLETED</option>
            </select>
          </div>

          <div class="col-md-3 d-grid">
            <button class="btn btn-success" type="submit">Create</button>
          </div>

          <div class="col-12">
            <div id="msg" class="small"></div>
          </div>
        </form>
      </div>
    </div>

    <div class="card mb-3">
      <div class="card-body">
        <div class="row g-2 align-items-end">
          <div class="col-md-4">
            <label class="form-label">Search (customer / phone / dress)</label>
            <input id="searchInput" class="form-control" placeholder="Search..." />
          </div>

          <div class="col-md-3">
            <label class="form-label">Status</label>
            <select id="statusFilter" class="form-select">
              <option value="">All</option>
              <option value="IN_SEWING">IN_SEWING</option>
              <option value="READY_FOR_FITTING">READY_FOR_FITTING</option>
              <option value="COMPLETED">COMPLETED</option>
            </select>
          </div>

          <div class="col-md-2 d-grid">
            <button id="filterBtn" class="btn btn-primary">Apply</button>
          </div>

          <div class="col-md-2 d-grid">
            <button id="resetBtn" class="btn btn-outline-secondary">Reset</button>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">Orders List</div>
      <div class="card-body table-responsive">
        <table class="table table-striped align-middle">
          <thead>
            <tr>
              <th>#</th>
              <th>Customer</th>
              <th>Phone</th>
              <th>Dress</th>
              <th>Type</th>
              <th>Pickup</th>
              <th>Return</th>
              <th>Total</th>
              <th>Status</th>
              <th>Change Status</th>
            </tr>
          </thead>
          <tbody id="ordersTbody"></tbody>
        </table>
      </div>
    </div>

  </div>

  <script src="./orders.js"></script>
</body>
</html>
