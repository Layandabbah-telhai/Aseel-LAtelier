<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aseel L'Atelier</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="./client/theme.css" rel="stylesheet">
</head>

<body>
  <div class="container py-4 py-md-5">

    <div class="hero mb-4">
      <div class="hero-inner">
        <div class="hero-grid">
          <div class="hero-brand-block">
            <div class="logo-and-copy">
              <img src="./client/logo.png" alt="Aseel L'Atelier" class="logo-img">

              <div class="hero-copy">
                <div class="brand">Aseel L'Atelier</div>
                <h1 class="hero-title">Bridal Collection</h1>
                <p class="hero-sub">
                  Discover elegant bridal pieces and access the atelier management system.
                </p>
              </div>
            </div>
          </div>

          <div class="hero-actions">
            <span class="pill"><span class="pill-dot"></span> Premium Studio</span>
            <a class="btn btn-outline-secondary btn-soft" href="./client/customers.html">Customers</a>
            <a class="btn btn-outline-secondary btn-soft" href="./client/dresses.html">Dresses</a>
            <a class="btn btn-outline-secondary btn-soft" href="./client/orders.html">Orders</a>
          </div>
        </div>
      </div>
    </div>

    <div class="card card-luxe mb-4">
      <div class="card-body">
        <div class="row align-items-center g-3">
          <div class="col-lg-8">
            <h2 class="mb-2" style="font-family: Georgia, 'Times New Roman', serif; color:#6e5d58;">
              Signature Dress Selection
            </h2>
            <p class="small-muted mb-0">
              A live preview of dresses from the atelier inventory.
            </p>
          </div>
          <div class="col-lg-4 text-lg-end">
            <a class="btn btn-primary" href="./client/dresses.html">Open Inventory</a>
          </div>
        </div>
      </div>
    </div>

    <div class="row g-4" id="catalogGrid">
      <div class="col-12">
        <div class="card card-luxe">
          <div class="card-body text-center small-muted">Loading collection...</div>
        </div>
      </div>
    </div>

  </div>

  <script>
    const API_BASE = "https://aseel-latelier-production.up.railway.app/api";
    const DRESSES_ENDPOINT = `${API_BASE}/dresses`;
    const FALLBACK_IMAGE = "./client/logo.png";

    async function loadCatalog() {
      const grid = document.getElementById("catalogGrid");

      try {
        const res = await fetch(DRESSES_ENDPOINT);
        if (!res.ok) throw new Error(`Failed to load dresses (${res.status})`);

        const dresses = await res.json();

        if (!Array.isArray(dresses) || dresses.length === 0) {
          grid.innerHTML = `
            <div class="col-12">
              <div class="card card-luxe">
                <div class="card-body text-center small-muted">No dresses found.</div>
              </div>
            </div>
          `;
          return;
        }

        grid.innerHTML = dresses.map(d => {
          const images = Array.isArray(d.images) && d.images.length
            ? d.images.map(img => img.image_url).filter(Boolean)
            : (d.image_url ? [d.image_url] : [FALLBACK_IMAGE]);

          const escapedImages = images.map(img => escapeHtml(img));
          const imagesJson = escapeHtml(JSON.stringify(escapedImages));

          return `
            <div class="col-md-6 col-lg-4">
              <div class="card card-luxe h-100 overflow-hidden">
                <div class="catalog-slider" data-images='${imagesJson}' data-index="0">
                  <img
                    src="${escapedImages[0] || FALLBACK_IMAGE}"
                    class="catalog-img slider-main-image"
                    alt="${escapeHtml(d.dress_name)}"
                    onerror="this.src='${FALLBACK_IMAGE}'"
                  >

                  ${escapedImages.length > 1 ? `
                    <button type="button" class="slider-arrow slider-arrow-left" onclick="changeSlide(this, -1)">
                      &#10094;
                    </button>
                    <button type="button" class="slider-arrow slider-arrow-right" onclick="changeSlide(this, 1)">
                      &#10095;
                    </button>
                  ` : ""}

                  <div class="slider-dots">
                    ${escapedImages.map((_, index) => `
                      <span class="slider-dot ${index === 0 ? "active" : ""}"></span>
                    `).join("")}
                  </div>
                </div>

                <div class="card-body">
                  <div class="d-flex align-items-center justify-content-between gap-2 mb-2">
                    <h5 class="catalog-title mb-0">${escapeHtml(d.dress_name)}</h5>
                    <span class="badge-soft px-3 py-2 rounded-pill">
                      ${escapedImages.length} image${escapedImages.length === 1 ? "" : "s"}
                    </span>
                  </div>

                  <p class="catalog-text mb-2">
                    Color: ${escapeHtml(d.color || "-")}<br>
                    Size: ${escapeHtml(d.size || "-")}<br>
                    Rental: ${formatPrice(d.rental_price)}<br>
                    Sale: ${formatPrice(d.sale_price)}
                  </p>

                  <span class="catalog-status ${statusClass(d.status)}">
                    ${escapeHtml(d.status || "Unknown")}
                  </span>
                </div>
              </div>
            </div>
          `;
        }).join("");
      } catch (error) {
        grid.innerHTML = `
          <div class="col-12">
            <div class="card card-luxe">
              <div class="card-body text-center text-danger">${escapeHtml(error.message)}</div>
            </div>
          </div>
        `;
      }
    }

    window.changeSlide = function (button, direction) {
      const slider = button.closest(".catalog-slider");
      if (!slider) return;

      const imageEl = slider.querySelector(".slider-main-image");
      const dots = slider.querySelectorAll(".slider-dot");
      const images = JSON.parse(slider.dataset.images || "[]");

      if (!images.length) return;

      let index = Number(slider.dataset.index || 0);
      index += direction;

      if (index < 0) index = images.length - 1;
      if (index >= images.length) index = 0;

      slider.dataset.index = index;
      imageEl.src = images[index] || FALLBACK_IMAGE;

      dots.forEach((dot, i) => {
        dot.classList.toggle("active", i === index);
      });
    };

    function formatPrice(value) {
      if (value === null || value === undefined || value === "") return "-";
      return Number(value).toFixed(2);
    }

    function statusClass(status) {
      const s = String(status || "").toLowerCase();
      if (s === "available") return "available";
      if (s === "rented") return "rented";
      if (s === "reserved") return "reserved";
      if (s === "sold") return "sold";
      if (s === "in repair") return "repair";
      return "available";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    loadCatalog();
  </script>
</body>

</html>
